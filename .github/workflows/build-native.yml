name: Build native helpers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-15
            platform: darwin
            arch: x64
            src: native/getenv_darwin.c
            cflags: "-arch x86_64 -mmacosx-version-min=10.15"
          - os: macos-15
            platform: darwin
            arch: arm64
            src: native/getenv_darwin.c
            cflags: ""
          - os: ubuntu-latest
            platform: linux
            arch: x64
            src: native/getenv_linux.c
            cflags: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build native helper
        run: |
          mkdir -p prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          cc -O2 -Wall -Wextra -Werror ${{ matrix.cflags }} \
            -o prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/htk-getenv \
            ${{ matrix.src }}
          chmod 755 prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/htk-getenv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/htk-getenv

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: prebuilds-raw

      - name: Arrange prebuilds
        run: |
          for dir in prebuilds-raw/prebuild-*; do
            platform_arch=$(basename "$dir" | sed 's/prebuild-//')
            mkdir -p "prebuilds/$platform_arch"
            cp "$dir/htk-getenv" "prebuilds/$platform_arch/htk-getenv"
            chmod 755 "prebuilds/$platform_arch/htk-getenv"
          done
          find prebuilds -type f -ls

      - name: Upload combined prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-all
          path: prebuilds/

  commit-prebuilds:
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          name: prebuilds-all
          path: prebuilds/

      - name: Commit prebuilds
        run: |
          chmod 755 prebuilds/*/htk-getenv
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prebuilds/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build: prebuilt binaries for ${{ github.ref_name }}"
            git push origin master
          fi
