<svg width="100%" viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>httptoolkit-mcp architecture</title>
  <desc>LLM clients connect via stdio MCP JSON-RPC to httptoolkit-mcp server with 7 tools. The MCP server communicates with HTTPToolkit Desktop over Unix socket for reads and HTTP for replays. Traffic sources feed into the Mockttp proxy.</desc>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');

    text { font-family: 'IBM Plex Sans', -apple-system, 'Segoe UI', sans-serif; }
  </style>

  <defs>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="#818b98" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="#0969da" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="#1a7f37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="#8250df" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══════════════════ BACKGROUND ══════════════════ -->
  <rect width="860" height="520" rx="12" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="859" height="519" rx="12" fill="none" stroke="#d1d9e0" stroke-width="1"/>

  <!-- ══════════════════ HEADER ══════════════════ -->
  <text x="40" y="42" font-size="18" font-weight="600" fill="#1f2328">httptoolkit-mcp</text>
  <text x="40" y="58" font-size="11" font-weight="400" fill="#818b98" letter-spacing="0.5">ARCHITECTURE</text>

  <!-- Version badge -->
  <rect x="228" y="28" width="44" height="18" rx="9" fill="#dafbe1" stroke="#82e596" stroke-width="0.5"/>
  <text x="250" y="41" text-anchor="middle" font-size="10" font-weight="500" fill="#1a7f37">v0.2.0</text>

  <!-- ══════════════════ LLM CLIENT ══════════════════ -->
  <rect x="40" y="120" width="150" height="100" rx="10" fill="#fff1e5" stroke="#ffc68c" stroke-width="0.75"/>

  <!-- Icon: terminal prompt -->
  <rect x="56" y="138" width="22" height="16" rx="3" fill="none" stroke="#bc4c00" stroke-width="0.75" opacity="0.6"/>
  <text x="62" y="150" font-size="9" font-family="'IBM Plex Mono', monospace" fill="#bc4c00" opacity="0.8">›_</text>

  <text x="84" y="150" font-size="13" font-weight="500" fill="#bc4c00">LLM client</text>
  <line x1="56" y1="162" x2="174" y2="162" stroke="#ffc68c" stroke-width="0.5"/>
  <text x="115" y="178" text-anchor="middle" font-size="11" fill="#59636e">Claude Code</text>
  <text x="115" y="193" text-anchor="middle" font-size="11" fill="#59636e">Cursor · Windsurf</text>
  <text x="115" y="208" text-anchor="middle" font-size="11" fill="#59636e">Any MCP host</text>

  <!-- ══════════════════ MCP SERVER ══════════════════ -->
  <rect x="290" y="88" width="200" height="240" rx="12" fill="#f1e5ff" stroke="#c8adf8" stroke-width="1"/>

  <!-- Header stripe -->
  <rect x="291" y="89" width="198" height="32" rx="11" fill="#eddeff"/>
  <rect x="291" y="110" width="198" height="11" fill="#eddeff"/>

  <!-- Server icon -->
  <circle cx="310" cy="105" r="4" fill="#8250df" opacity="0.7"/>
  <text x="322" y="109" font-size="13" font-weight="500" fill="#8250df">httptoolkit-mcp</text>

  <!-- Transport badges -->
  <rect x="305" y="128" width="52" height="16" rx="8" fill="#ffffff" stroke="#c8adf8" stroke-width="0.5"/>
  <text x="331" y="139.5" text-anchor="middle" font-size="10" font-weight="500" fill="#8250df">stdio</text>

  <rect x="363" y="128" width="74" height="16" rx="8" fill="#ffffff" stroke="#c8adf8" stroke-width="0.5"/>
  <text x="400" y="139.5" text-anchor="middle" font-size="10" font-weight="500" fill="#8250df">JSON-RPC</text>

  <!-- Tool grid -->
  <rect x="305" y="156" width="170" height="158" rx="8" fill="#ffffff" stroke="#d1d9e0" stroke-width="0.5"/>

  <!-- Tool header -->
  <text x="315" y="174" font-size="11" fill="#59636e">7 tools</text>

  <!-- Tool list -->
  <text x="315" y="194" font-size="10.5" font-family="'IBM Plex Mono', monospace" fill="#0969da">events_list</text>
  <text x="315" y="210" font-size="10.5" font-family="'IBM Plex Mono', monospace" fill="#0969da">events_get</text>
  <text x="315" y="226" font-size="10.5" font-family="'IBM Plex Mono', monospace" fill="#0969da">events_body</text>
  <text x="315" y="242" font-size="10.5" font-family="'IBM Plex Mono', monospace" fill="#1a7f37">replay_request</text>
  <text x="315" y="258" font-size="10.5" font-family="'IBM Plex Mono', monospace" fill="#1a7f37">replay_raw</text>
  <text x="315" y="274" font-size="10.5" font-family="'IBM Plex Mono', monospace" fill="#818b98">interceptors_list</text>
  <text x="315" y="290" font-size="10.5" font-family="'IBM Plex Mono', monospace" fill="#818b98">server_status</text>

  <!-- Read/Write/Info badges -->
  <rect x="422" y="186" width="42" height="14" rx="7" fill="#ddf4ff" stroke="#a4d3f5" stroke-width="0.5"/>
  <text x="443" y="196" text-anchor="middle" font-size="8.5" font-weight="500" fill="#0969da">read</text>

  <rect x="422" y="202" width="42" height="14" rx="7" fill="#ddf4ff" stroke="#a4d3f5" stroke-width="0.5"/>
  <text x="443" y="212" text-anchor="middle" font-size="8.5" font-weight="500" fill="#0969da">read</text>

  <rect x="422" y="218" width="42" height="14" rx="7" fill="#ddf4ff" stroke="#a4d3f5" stroke-width="0.5"/>
  <text x="443" y="228" text-anchor="middle" font-size="8.5" font-weight="500" fill="#0969da">read</text>

  <rect x="422" y="234" width="42" height="14" rx="7" fill="#dafbe1" stroke="#82e596" stroke-width="0.5"/>
  <text x="443" y="244" text-anchor="middle" font-size="8.5" font-weight="500" fill="#1a7f37">write</text>

  <rect x="422" y="250" width="42" height="14" rx="7" fill="#dafbe1" stroke="#82e596" stroke-width="0.5"/>
  <text x="443" y="260" text-anchor="middle" font-size="8.5" font-weight="500" fill="#1a7f37">write</text>

  <rect x="422" y="266" width="42" height="14" rx="7" fill="#f6f8fa" stroke="#d1d9e0" stroke-width="0.5"/>
  <text x="443" y="276" text-anchor="middle" font-size="8.5" font-weight="500" fill="#818b98">info</text>

  <rect x="422" y="282" width="42" height="14" rx="7" fill="#f6f8fa" stroke="#d1d9e0" stroke-width="0.5"/>
  <text x="443" y="292" text-anchor="middle" font-size="8.5" font-weight="500" fill="#818b98">info</text>

  <!-- ══════════════════ HTTPTOOLKIT DESKTOP ══════════════════ -->
  <rect x="590" y="88" width="230" height="340" rx="12" fill="#ddf4ff" stroke="#a4d3f5" stroke-width="1"/>

  <!-- Header stripe -->
  <rect x="591" y="89" width="228" height="32" rx="11" fill="#c8e6ff"/>
  <rect x="591" y="110" width="228" height="11" fill="#c8e6ff"/>

  <!-- App icon dots -->
  <circle cx="610" cy="105" r="3" fill="#cf222e" opacity="0.8"/>
  <circle cx="621" cy="105" r="3" fill="#bc4c00" opacity="0.8"/>
  <circle cx="632" cy="105" r="3" fill="#1a7f37" opacity="0.8"/>
  <text x="644" y="109" font-size="13" font-weight="500" fill="#0969da">HTTPToolkit Desktop</text>

  <text x="705" y="132" text-anchor="middle" font-size="11" fill="#59636e">Electron application</text>

  <!-- REST API box -->
  <rect x="608" y="150" width="194" height="90" rx="8" fill="#ffffff" stroke="#d1d9e0" stroke-width="0.5"/>

  <text x="705" y="172" text-anchor="middle" font-size="13" font-weight="500" fill="#1f2328">REST API</text>
  <line x1="620" y1="180" x2="790" y2="180" stroke="#d1d9e0" stroke-width="0.5"/>
  <text x="705" y="196" text-anchor="middle" font-size="10.5" font-family="'IBM Plex Mono', monospace" fill="#818b98">localhost:45457</text>
  <text x="705" y="212" text-anchor="middle" font-size="11" fill="#59636e">Bearer token auth</text>
  <text x="705" y="226" text-anchor="middle" font-size="11" fill="#59636e">Auto-detected on macOS/Linux</text>

  <!-- Mockttp Proxy box -->
  <rect x="608" y="260" width="194" height="90" rx="8" fill="#ffffff" stroke="#d1d9e0" stroke-width="0.5"/>

  <text x="705" y="282" text-anchor="middle" font-size="13" font-weight="500" fill="#1f2328">Mockttp proxy</text>
  <line x1="620" y1="290" x2="790" y2="290" stroke="#d1d9e0" stroke-width="0.5"/>
  <text x="705" y="306" text-anchor="middle" font-size="10.5" font-family="'IBM Plex Mono', monospace" fill="#818b98">localhost:8000</text>
  <text x="705" y="322" text-anchor="middle" font-size="11" fill="#59636e">HTTP + HTTPS interception</text>
  <text x="705" y="338" text-anchor="middle" font-size="11" fill="#59636e">TLS termination</text>

  <!-- ══════════════════ TRAFFIC SOURCES ══════════════════ -->
  <rect x="608" y="442" width="194" height="60" rx="8" fill="#ddf4f0" stroke="#89dcd0" stroke-width="0.75"/>

  <text x="705" y="466" text-anchor="middle" font-size="13" font-weight="500" fill="#0e6d62">Traffic sources</text>
  <text x="705" y="482" text-anchor="middle" font-size="11" fill="#59636e">Mobile · Browsers · Docker · CLI</text>

  <!-- ══════════════════ CONNECTORS ══════════════════ -->

  <!-- LLM → MCP Server (bidirectional) -->
  <line x1="190" y1="162" x2="288" y2="162" stroke="#8250df" stroke-width="1.2" marker-end="url(#arr-purple)" opacity="0.7"/>
  <line x1="288" y1="178" x2="190" y2="178" stroke="#8250df" stroke-width="1.2" marker-end="url(#arr-purple)" opacity="0.7"/>

  <text x="239" y="155" text-anchor="middle" font-size="10" font-weight="500" fill="#8250df" letter-spacing="0.3">stdio</text>
  <text x="239" y="192" text-anchor="middle" font-size="9.5" font-family="'IBM Plex Mono', monospace" fill="#818b98">MCP JSON-RPC</text>

  <!-- MCP Server → REST API (HTTP replay) -->
  <line x1="490" y1="195" x2="606" y2="195" stroke="#1a7f37" stroke-width="1.2" marker-end="url(#arr-green)" opacity="0.7"/>

  <rect x="518" y="177" width="56" height="14" rx="7" fill="#ffffff" stroke="#82e596" stroke-width="0.5"/>
  <text x="546" y="187.5" text-anchor="middle" font-size="9" font-weight="500" fill="#1a7f37">HTTP</text>

  <!-- MCP Server → Mockttp Proxy (Unix socket read) -->
  <path d="M490 270 L548 270 L548 305 L606 305" fill="none" stroke="#0969da" stroke-width="1.2" marker-end="url(#arr-blue)" opacity="0.7"/>

  <rect x="496" y="252" width="80" height="14" rx="7" fill="#ffffff" stroke="#a4d3f5" stroke-width="0.5"/>
  <text x="536" y="262.5" text-anchor="middle" font-size="9" font-weight="500" fill="#0969da">Unix socket</text>

  <!-- Traffic Sources → Proxy -->
  <line x1="705" y1="440" x2="705" y2="352" stroke="#0e6d62" stroke-width="1.2" marker-end="url(#arr-gray)" opacity="0.5"/>

  <!-- Annotation labels -->
  <text x="548" y="212" text-anchor="middle" font-size="9.5" font-family="'IBM Plex Mono', monospace" fill="#818b98">replay tools</text>
  <text x="548" y="325" text-anchor="middle" font-size="9.5" font-family="'IBM Plex Mono', monospace" fill="#818b98">read tools · no auth</text>

  <!-- ══════════════════ LEGEND ══════════════════ -->
  <rect x="40" y="420" width="200" height="82" rx="8" fill="#f6f8fa" stroke="#d1d9e0" stroke-width="0.5"/>

  <text x="56" y="440" font-size="11" fill="#59636e">Data flow</text>

  <line x1="56" y1="454" x2="86" y2="454" stroke="#0969da" stroke-width="1.5"/>
  <circle cx="90" cy="454" r="2" fill="#0969da"/>
  <text x="100" y="458" font-size="10.5" font-family="'IBM Plex Mono', monospace" fill="#59636e">Read path</text>

  <line x1="56" y1="474" x2="86" y2="474" stroke="#1a7f37" stroke-width="1.5"/>
  <circle cx="90" cy="474" r="2" fill="#1a7f37"/>
  <text x="100" y="478" font-size="10.5" font-family="'IBM Plex Mono', monospace" fill="#59636e">Write / replay</text>

  <line x1="56" y1="494" x2="86" y2="494" stroke="#0e6d62" stroke-width="1.5" opacity="0.5"/>
  <circle cx="90" cy="494" r="2" fill="#0e6d62" opacity="0.5"/>
  <text x="100" y="498" font-size="10.5" font-family="'IBM Plex Mono', monospace" fill="#59636e">Traffic ingress</text>

  <!-- ══════════════════ FOOTER ATTRIBUTION ══════════════════ -->
  <text x="820" y="504" text-anchor="end" font-size="9" fill="#818b98" font-family="'IBM Plex Mono', monospace">NinjaScout77</text>

</svg>
